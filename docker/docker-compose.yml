# InvenTree Docker Compose for QA Hackathon testing
# Usage: docker compose -f docker/docker-compose.yml --env-file docker/.env up -d

services:
  inventree-db:
    image: postgres:17
    container_name: inventree-qa-db
    expose:
      - ${INVENTREE_DB_PORT:-5432}/tcp
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdb
      - POSTGRES_USER=${INVENTREE_DB_USER}
      - POSTGRES_PASSWORD=${INVENTREE_DB_PASSWORD}
      - POSTGRES_DB=${INVENTREE_DB_NAME}
    volumes:
      - inventree-db-data:/var/lib/postgresql/data/
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INVENTREE_DB_USER} -d ${INVENTREE_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  inventree-cache:
    image: redis:7-alpine
    container_name: inventree-qa-cache
    expose:
      - ${INVENTREE_CACHE_PORT:-6379}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  inventree-server:
    image: inventree/inventree:${INVENTREE_TAG:-stable}
    container_name: inventree-qa-server
    expose:
      - ${INVENTREE_WEB_PORT:-8000}
    depends_on:
      inventree-db:
        condition: service_healthy
      inventree-cache:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - inventree-data:/home/inventree/data:z
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  inventree-worker:
    image: inventree/inventree:${INVENTREE_TAG:-stable}
    container_name: inventree-qa-worker
    command: invoke worker
    depends_on:
      inventree-server:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - inventree-data:/home/inventree/data:z
    restart: unless-stopped

  inventree-proxy:
    image: caddy:alpine
    container_name: inventree-qa-proxy
    restart: unless-stopped
    depends_on:
      inventree-server:
        condition: service_healthy
    ports:
      - "${INVENTREE_HTTP_PORT:-8080}:80"
      - "${INVENTREE_HTTPS_PORT:-8443}:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - inventree-data:/var/www:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  inventree-db-data:
  inventree-data:
  caddy-data:
  caddy-config:
